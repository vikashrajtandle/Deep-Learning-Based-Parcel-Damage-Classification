{% extends 'users/userbase.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Training Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f8f9fa;
            color: #333;
        }
        h1 {
            color: #007bff;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        h2 {
            color: #343a40;
            margin-top: 40px;
        }
        img {
            max-width: 90%;
            border: 1px solid #ccc;
            padding: 10px;
            background: white;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
        }
        .accuracy {
            font-size: 1.2em;
            background: #e9f7ef;
            border-left: 5px solid #28a745;
            padding: 10px 15px;
            margin: 20px 0;
        }
        code {
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Model Training Results</h1>

    <div class="accuracy">
        <strong>Test Accuracy:</strong> {{ accuracy }}%
    </div>

    <h2>Loss Curve</h2>
    <img src="{{ loss_plot }}" alt="Loss Plot" />

    <h2>Accuracy Curve</h2>
    <img src="{{ acc_plot }}" alt="Accuracy Plot" />

    <h2>Confusion Matrix</h2>
    <img src="{{ cm_plot }}" alt="Confusion Matrix" />

    <p><strong>Model saved at:</strong> <code>{{ model_path }}</code></p>

</body>
</html>
{% endblock %}
